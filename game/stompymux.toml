# stompymux.toml - MUX configuration file
# ----------------------------------------------------------------------------
# From within this file, you can change much about the way your game behaves.
# Some directives are clearly labeled and described, others are not. Others
# aren't even listed in this file. For a complete list with descriptions,
# please see docs/content/en/docs/configuration/stompymux-toml.md.
# ----------------------------------------------------------------------------

# Include the stock command and flag aliases. Add local
# aliases in the [aliases.*] tables below instead of editing aliases.toml -
# this file's own keys always win over anything pulled in via `include`.
include = ["aliases.toml"]

# -----------------------------------------------
#  SQLite game database
# -----------------------------------------------

[database]
game_database = "data/stompymux.db.sqlite"
mech_database = "mechs"
map_database = "maps"
# Interval at which to save the database.
dump_interval = 1200

# -----------------------------------------------
#  Lua runtime
# -----------------------------------------------

[lua]
# Directory containing global and object Lua modules.
directory = "lua"
# Maximum Lua VM instructions permitted for a single callback.
instruction_limit = 100000
# Maximum memory, in bytes, permitted for the Lua VM.
memory_limit = 67108864

# -----------------------------------------------
#  Important Directives (Look these over!)
# -----------------------------------------------

[server]
# The port you want your game to run on.
port = 5555
# The name returned by mudname().
mud_name = "Big Stompy Robot Game"
# -----------------------------------------------
#  Define local aliases/parameters/whatnot here.
# -----------------------------------------------

[battletech]
# As armor/ammo is expended, allow units to exceed their max speed.
dynspeed = 0
digbonus = 2
dig_only_fs = 1
# TACs will not occur until units fall below this armor percentage.
critlevel = 66
# Nonzero value for tank crit blocking
vcrit = 101
# -1 Maxtech, 0 Semi-FASA, 1 FASA'y
fasacrit = -1
# Allow players to explode their reactors (via explode reactor).
explode_reactor = 1
# Allow players to explode their ammo (via explode ammo).
explode_ammo = 1
# Allow playres to abort their self-destruction sequences.
explode_stop = 0
# Time it takes for a self destruction. Ammo explode takes 1/2 the time.
explode_time = 120
erange = 0
# Hit arcs.  0 = TW (default), 1 = BTMUX (all 90 degrees), 2 = BMR.
hit_arcs = 0
# If 1, allow MW embark/disembark and XP loss, if 0, don't.
ic = 0
# Roll on players' piloting skill for physical attacks.
phys_use_pskill = 1
slowdown = 2
fasaturn = 0
newterrain = 0
newcharge = 1
# Give -#MP instead of a flat speed 0 in most tank crits
tankfriendly = 0
# Save tanks from crash damage
tankshield = 0
skidcliff = 1
# Units must be stalled to do serious repairs if true.
limitedrepairs = 1
# Object to store mechs after destruction in.
usedmechstore = 3
# Mushroom on triple engine deaths.
stackpole = 1
# Place to move players to upon death.
afterlife_dbref = 167

# -----------------------------------------------
#  XP System
# -----------------------------------------------

[battletech.xp]
# 0 for new system, 1 for old XP system.
oldxpsystem = 0
bthmod = 200
vrtmod = 1
# XP multiplier for Missile weapons.
missilemod = 69
# XP multiplier for Ammo/Ballistic weapons.
ammomod = 42
defaultweapdam = 3
defaultweapbv = 70
# Overall XP modifier
modifier = 100

# -----------------------------------------------
#  Base MUX Configs
# -----------------------------------------------

[mux]
# Lua parents assigned to newly created objects. Paths are relative to
# game/lua/object_logic.
default_thing_lua_parent = "default_thing.lua"
default_room_lua_parent = "default_room.lua"
default_exit_lua_parent = "default_exit.lua"
default_player_lua_parent = "default_player.lua"
# Flags that are set on players after creation.
default_player_flags = ["ansi", "ansimap", "in_character"]
# Flags that are set on exits after creation.
default_exit_flags = ["no_command"]
# Flags that are set on rooms after creation.
default_room_flags = ["no_command"]
# Flags that are set on things after creation.
default_thing_flags = []
# Command quota per player.
command_quota_increment = 1000
# The interval at which players' command quotas are increased.
timeslice = 50
# Fork off a new process for db dumps.
fork_dump = true
# Room where players start after creation.
player_starting_room = 95
# Default home for new players.
player_starting_home = 95
# Interval for checking idle players.
idle_interval = 99999
# Amount of time a player must be idle before being idlekicked.
idle_timeout = 99999999
# Messages to show during and after DB dumps (spammy).
# dump_message = "BattletechMUX : Saving Database. Game will pause."
# postdump_message = "BattletechMUX : Database Saved."
# The number of commands to be run from queue when there is net traffic.
queue_active_chunk = 100
# Number of commands to be run from queue when there is no net traffic.
queue_idle_chunk = 200

# -----------------------------------------------
#  Password and Login Security
# -----------------------------------------------

[security]
# Maximum permitted player password length.
player_password_length_limit = 64
# Argon2id work factors. Memory is measured in bytes.
password_hash_opslimit = 3
password_hash_memlimit = 12582912
# Per-source login burst, seconds per restored attempt, and global hash rate.
login_attempt_burst = 3
login_attempt_refill = 10
login_hash_limit = 5

# -----------------------------------------------
#  Site Permissions
# -----------------------------------------------

[sites]
# Example: Forbid this site from connecting.
# forbid = [ { address = "216.184.159.82", mask = "255.255.255.255" } ]

# -----------------------------------------------
#  Command Security
# -----------------------------------------------

# Limit commands access.
[access.commands]
"@name" = "wizard"
"@npemit" = "wizard"
"@dig" = "wizard"
"@clone" = "wizard"
"@oemit" = "wizard"
"@emit" = "wizard"
"@open" = "wizard"
"@remit" = "wizard"

# -----------------------------------------------
#  Logging Options
# -----------------------------------------------

[logging]
log_options = ["flags", "location", "timestamp"]
log = ["!accounting", "!all_commands", "!bad_commands", "!buffer_alloc",
       "!checkpoints", "bugs", "!config_changes", "!create", "!logins",
       "!network", "problems", "security", "!shouts", "!startup",
       "!wizard", "!allwizbit", "!suspect_commands"]
