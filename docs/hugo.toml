baseURL = 'https://example.invalid/'
locale = 'en-us'
title = 'StompyMUX Documentation'
description = 'Documentation for the StompyMUX game server.'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    contentDir = 'content/en'
    label = 'English'
    weight = 1

[[menu.main]]
  name = 'Documentation'
  url = '/docs/'
  weight = 10

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.157.0"
  [[module.imports]]
    path = "github.com/google/docsy"

[params.ui]
  sidebar_menu_compact = true
  sidebar_search_disable = false
  showLightDarkModeMenu = true
